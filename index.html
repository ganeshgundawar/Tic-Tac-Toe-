<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div id="result-box">
            <div id="result-box2"><span id="result">Match Draw . </span> <button onclick="reset()">Play Again</button>
            </div>
        </div>
        <h1>Tic Tac Toe</h1>
        <div class="outer-box">
            <div class="box">
                <div class="row">
                    <div class="innerbox" onclick="move('00')" id="00"></div>
                    <div class="innerbox" onclick="move('01')" id="01"></div>
                    <div class="innerbox" onclick="move('02')" id="02"></div>
                </div>

                <div class="row">
                    <div class="innerbox" onclick="move('10')" id="10"></div>
                    <div class="innerbox" onclick="move('11')" id="11"></div>
                    <div class="innerbox" onclick="move('12')" id="12"></div>
                </div>

                <div class="row">
                    <div class="innerbox" onclick="move('20')" id="20"></div>
                    <div class="innerbox" onclick="move('21')" id="21"></div>
                    <div class="innerbox" onclick="move('22')" id="22"></div>
                </div>
            </div>
            <div id="player-box"><span style="color:#FB8175" id="player">X</span> To play</div>
        </div>
        <div style="text-align:center"><button onclick="reset()" class="btn">Reset</button></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
